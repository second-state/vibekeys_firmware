name: Pre-Release

on:
  push:
    tags:
      - 'v*-rc*'
      - 'v*-beta*'
      - 'v*-alpha*'
      - 'v*-pre*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Pre-release tag (e.g. v0.1.0-rc1)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Pre-Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true

      - name: Enable caching
        uses: Swatinem/rust-cache@v2

      - name: Install espflash
        run: cargo install --locked espflash

      - name: Build keys
        run: ./build.sh keys
        env:
          VIBEKEYS_OTA_URL: https://github.com/second-state/vibekeys_firmware/releases/download/${{ github.event.inputs.release_tag || github.ref_name }}/vibekeys_ota.bin

      - name: Build max2
        run: ./build.sh max2
        env:
          VIBEKEYS_OTA_URL: https://github.com/second-state/vibekeys_firmware/releases/download/${{ github.event.inputs.release_tag || github.ref_name }}/vibekeys_max2_ota.bin

      - name: Build keys_ota_bin
        run: ./build.sh keys_ota_bin
        env:
          VIBEKEYS_OTA_URL: https://github.com/second-state/vibekeys_firmware/releases/download/${{ github.event.inputs.release_tag || github.ref_name }}/vibekeys_ota.bin

      - name: Build max2_ota_bin
        run: ./build.sh max2_ota_bin
        env:
          VIBEKEYS_OTA_URL: https://github.com/second-state/vibekeys_firmware/releases/download/${{ github.event.inputs.release_tag || github.ref_name }}/vibekeys_max2_ota.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibekeys
          path: |
            ./vibekeys_ota.bin
            ./vibekeys.bin
            ./vibekeys_max2_ota.bin
            ./vibekeys_max2.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          prerelease: true
          make_latest: "false"
          generate_release_notes: true
          files: artifacts/**/*
